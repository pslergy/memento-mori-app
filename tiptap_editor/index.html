<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TipTap Editor</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 24px;
      background: #1e1e2e;
      color: #cdd6f4;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 16px 0;
      color: #89b4fa;
    }
    .editor-wrap {
      max-width: 720px;
      margin: 0 auto;
      background: #313244;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 12px;
      background: #45475a;
      border-bottom: 1px solid #585b70;
    }
    .toolbar button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #585b70;
      color: #cdd6f4;
      cursor: pointer;
      font-size: 14px;
    }
    .toolbar button:hover {
      background: #6c7086;
    }
    .toolbar button.is-active {
      background: #89b4fa;
      color: #1e1e2e;
    }
    .element {
      padding: 20px 24px;
      min-height: 280px;
      outline: none;
    }
    .element p { margin: 0 0 0.75em 0; }
    .element h1 { font-size: 1.75rem; margin: 1em 0 0.5em 0; }
    .element h2 { font-size: 1.35rem; margin: 1em 0 0.5em 0; }
    .element h3 { font-size: 1.15rem; margin: 1em 0 0.5em 0; }
    .element ul, .element ol { margin: 0.75em 0; padding-left: 1.5em; }
    .element pre { background: #181825; padding: 12px; border-radius: 8px; overflow-x: auto; }
    .element code { background: #181825; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
    .element blockquote {
      border-left: 4px solid #89b4fa;
      margin: 1em 0;
      padding-left: 1em;
      color: #a6adc8;
    }
    .element hr { border: none; border-top: 1px solid #585b70; margin: 1.5em 0; }
    .placeholder::before {
      content: attr(data-placeholder);
      color: #6c7086;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <h1>TipTap Editor</h1>
  <p style="color: #a6adc8; margin-bottom: 20px;">Отдельный полноценный редактор на TipTap (CDN). Не связан с SDK и основным проектом.</p>

  <div class="editor-wrap">
    <div class="toolbar">
      <button type="button" data-action="bold" title="Жирный">B</button>
      <button type="button" data-action="italic" title="Курсив">I</button>
      <button type="button" data-action="strike" title="Зачёркнутый">S</button>
      <button type="button" data-action="code" title="Код">&lt;/&gt;</button>
      <span style="width:1px; height:24px; background:#585b70; margin:0 4px;"></span>
      <button type="button" data-action="heading" data-level="1" title="Заголовок 1">H1</button>
      <button type="button" data-action="heading" data-level="2" title="Заголовок 2">H2</button>
      <button type="button" data-action="heading" data-level="3" title="Заголовок 3">H3</button>
      <button type="button" data-action="paragraph" title="Параграф">P</button>
      <span style="width:1px; height:24px; background:#585b70; margin:0 4px;"></span>
      <button type="button" data-action="bulletList" title="Маркированный список">•</button>
      <button type="button" data-action="orderedList" title="Нумерованный список">1.</button>
      <button type="button" data-action="blockquote" title="Цитата">"</button>
      <button type="button" data-action="codeBlock" title="Блок кода">{}</button>
      <span style="width:1px; height:24px; background:#585b70; margin:0 4px;"></span>
      <button type="button" data-action="horizontalRule" title="Разделитель">—</button>
    </div>
    <div class="element" id="editor"></div>
  </div>

  <script type="module">
    import { Editor } from 'https://esm.sh/@tiptap/core@2.10.3'
    import StarterKit from 'https://esm.sh/@tiptap/starter-kit@2.10.3'
    import Placeholder from 'https://esm.sh/@tiptap/extension-placeholder@2.10.3'

    const editor = new Editor({
      element: document.querySelector('#editor'),
      extensions: [
        StarterKit,
        Placeholder.configure({
          placeholder: 'Начните вводить текст…',
        }),
      ],
      content: '<p>Привет! Это <strong>TipTap</strong> — редактор в отдельной папке. Можно писать, форматировать и экспортировать HTML.</p>',
      editorProps: {
        attributes: {
          class: 'element',
        },
      },
    })

    // Toolbar
    document.querySelectorAll('.toolbar [data-action]').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action
        const level = btn.dataset.level
        const chain = editor.chain().focus()
        if (action === 'bold') chain.toggleBold().run()
        else if (action === 'italic') chain.toggleItalic().run()
        else if (action === 'strike') chain.toggleStrike().run()
        else if (action === 'code') chain.toggleCode().run()
        else if (action === 'heading' && level) chain.toggleHeading({ level: parseInt(level, 10) }).run()
        else if (action === 'paragraph') chain.setParagraph().run()
        else if (action === 'bulletList') chain.toggleBulletList().run()
        else if (action === 'orderedList') chain.toggleOrderedList().run()
        else if (action === 'blockquote') chain.toggleBlockquote().run()
        else if (action === 'codeBlock') chain.toggleCodeBlock().run()
        else if (action === 'horizontalRule') chain.setHorizontalRule().run()
      })
    })

    // Highlight active toolbar state
    editor.on('selectionUpdate', () => {
      document.querySelectorAll('.toolbar [data-action]').forEach(btn => {
        const action = btn.dataset.action
        const level = btn.dataset.level
        let on = false
        if (action === 'bold') on = editor.isActive('bold')
        else if (action === 'italic') on = editor.isActive('italic')
        else if (action === 'strike') on = editor.isActive('strike')
        else if (action === 'code') on = editor.isActive('code')
        else if (action === 'heading' && level) on = editor.isActive('heading', { level: parseInt(level, 10) })
        else if (action === 'paragraph') on = editor.isActive('paragraph')
        else if (action === 'bulletList') on = editor.isActive('bulletList')
        else if (action === 'orderedList') on = editor.isActive('orderedList')
        else if (action === 'blockquote') on = editor.isActive('blockquote')
        else if (action === 'codeBlock') on = editor.isActive('codeBlock')
        btn.classList.toggle('is-active', on)
      })
    })

    window.getEditorHTML = () => editor.getHTML()
    window.getEditorJSON = () => JSON.stringify(editor.getJSON(), null, 2)
  </script>
</body>
</html>
